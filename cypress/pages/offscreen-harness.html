<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>offscreen.js harness</title>
  <script>
    // Minimal chrome.* stub so offscreen.js can load outside the
    // extension and the report builders (.console.log/.har) can be tested.
    window.chrome = {
      runtime: {
        onMessage: { addListener() {} },
        sendMessage() {},
        getManifest() { return { version: "0.0.0-test" }; },
      },
    };
  </script>
  <script src="/capture-common.js"></script>
  <script src="/offscreen.js"></script>
</head>
<body>
  Harness for the offscreen document's report builders.
</body>
</html>
