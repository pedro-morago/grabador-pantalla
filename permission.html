<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Permiso de micrófono</title>
<style>
  :root{
    --bg:#0E1116; --panel:#1E252E; --border:#2A323D; --border-hi:#3A4552;
    --text:#E7ECF3; --muted:#8B95A4; --green:#34D399; --rec:#FF3B30; --focus:#5B9BFF;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--text); font-family:var(--sans); padding:20px;
  }
  .card{
    width:100%; max-width:420px; background:var(--panel);
    border:1px solid var(--border); border-radius:14px; padding:26px;
  }
  .head{
    font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }
  p{font-size:14px; line-height:1.6; margin:0 0 16px}
  #status{
    padding:11px 13px; border-radius:9px; font-size:13px; line-height:1.5;
    background:var(--bg); border:1px solid var(--border-hi); color:var(--muted);
    margin-bottom:16px;
  }
  #status.ok{border-color:rgba(52,211,153,.45); color:var(--green)}
  #status.fail{border-color:rgba(255,59,48,.45); color:#FF9B94}
  button{
    width:100%; padding:12px; border:1px solid var(--border-hi); border-radius:10px;
    background:var(--bg); color:var(--text); font-size:14px; font-weight:600; cursor:pointer;
  }
  button:hover{background:#252D37}
  button:focus-visible{outline:2px solid var(--focus); outline-offset:2px}
</style>
</head>
<body>
  <div class="card">
    <div class="head">Grabador de pantalla</div>
    <p>Para incluir tu voz en las grabaciones, la extensión necesita acceso al micrófono. Se solicita una sola vez.</p>
    <div id="status">Solicitando permiso…</div>
    <button id="retry">Reintentar</button>
  </div>
  <script src="permission.js"></script>
</body>
</html>
